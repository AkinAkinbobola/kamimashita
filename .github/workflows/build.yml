name: Build Windows Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RELEASE_DIR: build/windows/x64/runner/Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows release
        run: flutter build windows --release

      - name: Build kami-dl
        run: cd kami-dl && go build -o ../build/windows/x64\runner/Release/kami-dl.exe .

      - name: Upload Windows release artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

      - name: Set release version
        id: release_version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create portable zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "$env:RELEASE_DIR\*" `
            -DestinationPath "build/windows/x64/runner/kamimashita-${{ steps.release_version.outputs.app_version }}-windows-portable.zip"

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: choco install innosetup -y

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: iscc installer.iss /DAppVersion=$env:APP_VERSION

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            kamimashita-${{ steps.release_version.outputs.app_version }}-setup.exe - installer, creates Start Menu shortcut and uninstaller entry
            kamimashita-${{ steps.release_version.outputs.app_version }}-windows-portable.zip - portable, extract and run, no installation needed
          files: |
            build/windows/x64/runner/kamimashita-${{ steps.release_version.outputs.app_version }}-windows-portable.zip
            build/installer/kamimashita-${{ steps.release_version.outputs.app_version }}-setup.exe

  build-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Set release version
        id: release_version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "app_version=$version" >> "$GITHUB_OUTPUT"

      - name: Build macOS release
        run: flutter build macos --release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        shell: bash
        run: |
          create-dmg \
            --volname "Kamimashita" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Kamimashita.app" 175 190 \
            --hide-extension "Kamimashita.app" \
            --app-drop-link 425 190 \
            "build/macos/kamimashita-${{ steps.release_version.outputs.app_version }}.dmg" \
            "build/macos/Build/Products/Release/Kamimashita.app"

      - name: Upload macOS asset and update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_found=false
          for attempt in {1..60}; do
            if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
              release_found=true
              break
            fi
            sleep 5
          done

          if [ "$release_found" != true ]; then
            echo "Release ${GITHUB_REF_NAME} was not created by the Windows job in time." >&2
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" \
            "build/macos/kamimashita-${{ steps.release_version.outputs.app_version }}.dmg" \
            --clobber

          cat <<EOF > release-notes.txt
          kamimashita-${{ steps.release_version.outputs.app_version }}-setup.exe - Windows installer
          kamimashita-${{ steps.release_version.outputs.app_version }}-windows-portable.zip - Windows portable
          kamimashita-${{ steps.release_version.outputs.app_version }}.dmg - macOS, open the DMG, drag to Applications, right-click -> Open on first launch due to Gatekeeper
          EOF

          gh release edit "${GITHUB_REF_NAME}" --notes-file release-notes.txt
